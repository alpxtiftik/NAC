services:
  postgres:
    image: postgres:18-alpine
    container_name: nac-postgres
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - nac-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: nac-redis
    networks:
      - nac-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    container_name: nac-api
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nac-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')\""]
      interval: 5s
      timeout: 5s
      retries: 10

  freeradius:
    image: freeradius/freeradius-server:latest-3.2
    container_name: nac-freeradius
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
    volumes:
      - ./freeradius/clients.conf:/etc/freeradius/clients.conf
      - ./freeradius/mods-available/rest:/etc/freeradius/mods-available/rest
      - ./freeradius/sites-available/default:/etc/freeradius/sites-available/default
    command: >
      sh -c "ln -sf /etc/freeradius/mods-available/rest /etc/freeradius/mods-enabled/rest &&
             ln -sf /etc/freeradius/sites-available/default /etc/freeradius/sites-enabled/default &&
             freeradius -X"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - nac-network

networks:
  nac-network:
    driver: bridge

volumes:
  pg_data:
